<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Discord 认证重定向</title>
	<script type="text/javascript">
		function saveTokens() {
			const params = new URLSearchParams(window.location.search);
			localStorage.setItem('5beam_auth', params.get('5beam_auth'));
			window.close();
		}
	</script>
</head>
<body onload="saveTokens()">
	<p>如果此窗口没有自动关闭，您可以手动将其关闭。</p>
</body>
</html>
